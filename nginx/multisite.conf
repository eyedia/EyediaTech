upstream eyediatech_upstream {
    server 127.0.0.1:8090;
}

upstream eyedeea_web_upstream {
    server 127.0.0.1:8080;
}

upstream eyedeea_api_upstream {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.eyediatech.com;

    location / {
        proxy_pass http://eyediatech_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name eyedeeaphotos.eyediatech.com;

    location /api/ {
        proxy_pass http://eyedeea_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://eyedeea_web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
